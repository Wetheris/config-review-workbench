include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml

stages:
  - quality
  - test
  - security

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

  # Let GitLab security scanners participate in merge-request pipelines.
  AST_ENABLE_MR_PIPELINES: "true"

  # Generated packages and local environments should not be treated as source.
  SAST_EXCLUDED_PATHS: ".venv,build,dist,.pytest_cache,.ruff_cache,tests"

workflow:
  rules:
    # Prefer merge-request pipelines once an MR exists.
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

    # Keep release/tag pipelines available.
    - if: '$CI_COMMIT_TAG'

    # Avoid a duplicate branch pipeline when the same branch has an open MR.
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never

    # Run checks for normal commits pushed to a branch.
    - if: '$CI_COMMIT_BRANCH'

.python-check:
  image: python:3.11-slim
  cache:
    key:
      files:
        - requirements.txt
        - requirements-build.txt
        - requirements-dev.txt
    paths:
      - .cache/pip/
  before_script:
    - python -m pip install --upgrade pip
    - |
      if [ -f requirements.txt ]; then
        python -m pip install -r requirements.txt
      fi
    - python -m pip install -r requirements-dev.txt

ruff-lint:
  extends: .python-check
  stage: quality
  script:
    - python scripts/check_project.py quality

ruff-format:
  extends: .python-check
  stage: quality
  script:
    - python scripts/check_project.py format
  # Keep this informational until the existing source has been formatted once.
  allow_failure: true

tests:
  extends: .python-check
  stage: test
  script:
    - python scripts/check_project.py test

python-security:
  extends: .python-check
  stage: security
  script:
    - python scripts/check_project.py security
  # Start as a warning so existing findings can be reviewed and baselined.
  # Remove this after the initial findings are resolved or intentionally skipped.
  allow_failure: true
