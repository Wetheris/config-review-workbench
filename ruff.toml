target-version = "py310"
line-length = 100
respect-gitignore = true

extend-exclude = [
  ".venv",
  "build",
  "dist",
  "vendor",
  ".pytest_cache",
  ".ruff_cache",
]

[lint]
# Start with Ruff's stable, low-noise correctness rules:
# syntax errors, undefined names, unused imports, and similar defects.
select = ["E4", "E7", "E9", "F"]

[format]
line-ending = "lf"
